name: CipherGuard CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test-and-security:
    name: Backend Lint, Security Scans & Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Static Security Analysis (Bandit SAST)
        run: |
          bandit -r backend/ -ll -ii

      - name: Dependency Vulnerability Audit (pip-audit)
        run: |
          pip-audit -r requirements.txt

      - name: Run Backend Pytest Suite
        run: |
          pytest -v

  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: Build React Frontend
        run: |
          cd frontend
          npm run build
